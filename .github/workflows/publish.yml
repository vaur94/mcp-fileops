name: Publish Package

on:
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      publish:
        description: Publish to npm instead of running a dry run
        required: true
        default: false
        type: boolean
      npm_tag:
        description: npm dist-tag to use when publishing from workflow_dispatch
        required: true
        default: latest
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Run release verification
        run: npm run ci:check

      - name: Inspect package contents
        run: npm run pack:dry-run

  publish:
    needs: verify
    if: github.event_name == 'release' || inputs.publish == true
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22.14.0'
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Verify release tag matches package version
        if: github.event_name == 'release'
        run: |
          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          RELEASE_TAG="${{ github.event.release.tag_name }}"
          if [ "$RELEASE_TAG" != "v$PACKAGE_VERSION" ]; then
            echo "Release tag $RELEASE_TAG does not match package version v$PACKAGE_VERSION" >&2
            exit 1
          fi

      - name: Publish package from release
        if: github.event_name == 'release'
        run: npm publish --provenance --access public

      - name: Publish package from workflow dispatch
        if: github.event_name == 'workflow_dispatch' && inputs.publish == true
        run: npm publish --provenance --access public --tag "${{ inputs.npm_tag }}"
